name: Build & Deploy

on:
  push:
    branches: [main]

env:
  ACR_REGISTRY: tomtroveacr.azurecr.io
  IMAGE_NAME: hitcf-adminweb

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build --platform linux/amd64 \
                       --build-arg BACKEND_URL=${{ secrets.BACKEND_URL_PROD }} \
                       -t ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
                       -t ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker push ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        run: |
          az webapp config container set \
            --name hitcf-adminweb \
            --resource-group HiTCF \
            --container-image-name ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          az webapp restart --name hitcf-adminweb --resource-group HiTCF

  smoke-test:
    needs: [deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Wait for container startup
        run: sleep 30

      - name: Check admin site is reachable
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://admin.hitcf.com" --max-time 10 -L || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            # 302/403 = Cloudflare Access redirect (expected), 200 = direct access
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ] || [ "$STATUS" = "403" ]; then
              echo "Admin site is reachable (HTTP $STATUS)"
              exit 0
            fi
            sleep 10
          done
          echo "::error::Admin site unreachable after 5 attempts"
          exit 1

  notify-success:
    needs: [lint, test, deploy, smoke-test]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Send success notification
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: |
          if [ -z "$RESEND_API_KEY" ] || [ -z "$NOTIFY_EMAIL" ]; then exit 0; fi
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          COMMIT="${{ github.event.head_commit.message }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SUBJECT="✅ ${REPO##*/} (${BRANCH}) deployed"
          BODY="<div style='font-family:sans-serif'><h3 style='color:#16a34a'>✅ Deploy Success</h3><p><b>Repo:</b> ${REPO}<br><b>Branch:</b> ${BRANCH}</p><p><b>Commit:</b> ${COMMIT}</p><p><a href='${RUN_URL}'>View run</a></p></div>"
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg from "HiTCF CI/CD <noreply@hitcf.com>" --arg to "$NOTIFY_EMAIL" --arg subject "$SUBJECT" --arg html "$BODY" '{from: $from, to: [$to], subject: $subject, html: $html}')"

  notify-failure:
    needs: [lint, test, deploy, smoke-test]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send failure notification
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: |
          if [ -z "$RESEND_API_KEY" ] || [ -z "$NOTIFY_EMAIL" ]; then
            echo "Notification secrets not configured, skipping"
            exit 0
          fi

          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          COMMIT="${{ github.event.head_commit.message }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          SUBJECT="❌ ${REPO} (${BRANCH}) deployment failed"

          BODY="<div style='font-family:sans-serif;max-width:600px'>
            <h2 style='color:#ef4444'>${SUBJECT}</h2>
            <table style='border-collapse:collapse;width:100%'>
              <tr><td style='padding:4px 12px;font-weight:bold'>Branch</td><td>${BRANCH}</td></tr>
              <tr><td style='padding:4px 12px;font-weight:bold'>Commit</td><td>${SHORT_SHA} — ${COMMIT}</td></tr>
              <tr><td style='padding:4px 12px;font-weight:bold'>Lint</td><td>${{ needs.lint.result }}</td></tr>
              <tr><td style='padding:4px 12px;font-weight:bold'>Test</td><td>${{ needs.test.result }}</td></tr>
              <tr><td style='padding:4px 12px;font-weight:bold'>Deploy</td><td>${{ needs.deploy.result }}</td></tr>
              <tr><td style='padding:4px 12px;font-weight:bold'>Smoke Test</td><td>${{ needs.smoke-test.result }}</td></tr>
            </table>
            <p><a href='${RUN_URL}'>View workflow run</a></p>
          </div>"

          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg from "HiTCF CI/CD <noreply@hitcf.com>" \
              --arg to "$NOTIFY_EMAIL" \
              --arg subject "$SUBJECT" \
              --arg html "$BODY" \
              '{from: $from, to: [$to], subject: $subject, html: $html}')"
